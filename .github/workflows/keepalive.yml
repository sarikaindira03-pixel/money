name: Keepalive Ping

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hrs
  workflow_dispatch: # allows manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive
        run: |
          curl -f "${{ secrets.APP_URL }}/api/keepalive?token=${{ secrets.KEEPALIVE_SECRET }}"
